  hestia-database:
    container_name: hestia-database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    image: postgres:15
    networks:
      - hestia-network
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    volumes:
      - hestia-database-volume:/var/lib/postgresql/data

  hestia-web:
    container_name: hestia-web
    image: wtfloris/hestia-web:latest
    networks:
      - hestia-network
    ports:
      - "19191:5050"
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - BREVO_API_KEY=${BREVO_API_KEY}
      - FROM_EMAIL=${FROM_EMAIL}
      - BASE_URL=${BASE_URL}
      - LOG_FORMAT=${LOG_FORMAT:-plain}
