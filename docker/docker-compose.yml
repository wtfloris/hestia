networks:
  hestia-network:
    name: hestia-network

volumes:
  hestia-database-volume:
    name: hestia-database-volume

x-scraper: &scraper-base
  healthcheck:
    test: pgrep cron || exit 1
    start_period: 5s
  image: wtfloris/hestia-scraper:latest
  init: true
  networks:
    - hestia-network
  restart: unless-stopped
  volumes:
    - /root/hestia/data:/data
  working_dir: /scraper

services:
  hestia-bot:
    container_name: hestia-bot
    healthcheck:
      test: cat /proc/1/cmdline || exit 1
      start_period: 5s
    image: wtfloris/hestia-bot:latest
    networks:
      - hestia-network
    restart: unless-stopped
    volumes:
      - /root/hestia/data:/data
    working_dir: /hestia

  hestia-scraper-maintenance:
    <<: *scraper-base
    container_name: hestia-scraper-maintenance

