networks:
  hestia-network-dev:
    name: hestia-network-dev

volumes:
  hestia-database-volume-dev:
    name: hestia-database-volume-dev

x-scraper-dev: &scraper-dev-base
  healthcheck:
    test: pgrep cron || exit 1
    start_period: 5s
  image: wtfloris/hestia-scraper:dev
  init: true
  networks:
    - hestia-network-dev
  restart: unless-stopped
  volumes:
    - /root/hestia-dev/data:/data
  working_dir: /scraper

services:
  hestia-bot-dev:
    container_name: hestia-bot-dev
    healthcheck:
      test: cat /proc/1/cmdline || exit 1
      start_period: 5s
    image: wtfloris/hestia-bot:dev
    networks:
      - hestia-network-dev
    restart: unless-stopped
    volumes:
      - /root/hestia-dev/data:/data
    working_dir: /hestia

  hestia-scraper-maintenance-dev:
    <<: *scraper-dev-base
    container_name: hestia-scraper-maintenance-dev

